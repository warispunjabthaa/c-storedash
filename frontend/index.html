<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Store Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; color: #333; }

  /* === TOP HEADER BAR === */
  .topbar { background: #fff; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #e0e0e0; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 24px; }
  .topbar-nav { display: flex; gap: 20px; }
  .topbar-nav a { color: #1a73e8; text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer; }
  .topbar-nav a:hover { text-decoration: underline; }
  .topbar-nav a.active-nav { color: #333; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #666; cursor: pointer; border-radius: 50%; font-size: 16px; }
  .topbar-icon:hover { background: #f0f0f0; }

  /* === LEFT SIDEBAR === */
  .sidebar { width: 185px; background: #1a2036; position: fixed; top: 50px; left: 0; bottom: 0; overflow-y: auto; z-index: 90; }
  .sidebar-store { padding: 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
  .sidebar-store:hover { background: rgba(255,255,255,0.05); }
  .store-circle { width: 44px; height: 44px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #1a2036; flex-shrink: 0; }
  .store-info { overflow: hidden; }
  .store-info strong { color: #fff; font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .store-info small { color: #8a94a6; font-size: 11px; }
  .sidebar-menu { padding: 8px 0; }
  .sidebar-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; color: #c5cad3; font-size: 13px; cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .sidebar-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .sidebar-item.active { background: rgba(255,255,255,0.12); color: #fff; }
  .sidebar-item .arrow { font-size: 10px; color: #8a94a6; }

  /* === MAIN CONTENT === */
  .main { margin-left: 185px; margin-top: 50px; padding: 24px 28px; min-height: calc(100vh - 50px); }
  .page-title { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .store-select-bar { margin-bottom: 16px; }
  .store-select-bar select { padding: 8px 14px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 14px; background: #fff; color: #333; min-width: 220px; cursor: pointer; }
  .store-select-bar select:focus { outline: none; border-color: #1a73e8; }

  /* === TASK CARDS === */
  .cards-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 14px; }
  .task-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e8eaed; display: flex; flex-direction: column; min-height: 160px; cursor: pointer; transition: box-shadow 0.2s; }
  .task-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .tc-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 10px; }
  .tc-date { font-size: 22px; color: #555; font-weight: 300; letter-spacing: 1px; }
  .tc-date.warn { color: #e67e22; }
  .tc-date.critical { color: #e74c3c; }
  .tc-sub { font-size: 12px; color: #999; margin-top: 4px; }
  .tc-count { font-size: 28px; font-weight: 700; color: #333; }
  .tc-msg { font-size: 12px; color: #999; margin-top: 4px; line-height: 1.5; }
  .tc-action { margin-top: auto; padding-top: 14px; text-align: center; }
  .tc-action a { color: #1a73e8; font-size: 13px; text-decoration: none; font-weight: 500; }

  /* === BOTTOM SECTIONS === */
  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
  .section-box { background: #fff; border-radius: 10px; padding: 20px 24px; border: 1px solid #e8eaed; }
  .section-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; }
  .settle-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
  .settle-row:last-child { border-bottom: none; }
  .settle-name { font-size: 14px; color: #333; font-weight: 500; }
  .settle-status { font-size: 12px; color: #999; margin-top: 2px; }
  .settle-btn { padding: 6px 20px; border-radius: 20px; border: 1px solid #1a73e8; background: #fff; color: #1a73e8; font-size: 13px; cursor: pointer; font-weight: 500; }
  .settle-btn:hover { background: #1a73e8; color: #fff; }
  .report-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
  .report-row:last-child { border-bottom: none; }
  .report-label { font-size: 14px; color: #333; }
  .report-btns { display: flex; gap: 8px; }
  .report-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid #1a73e8; background: #fff; color: #1a73e8; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .report-view-btn { padding: 5px 16px; border-radius: 20px; border: 1px solid #ccc; background: #fff; color: #333; font-size: 12px; cursor: pointer; }

  /* === LIVE DATA PAGE === */
  .live-summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .summary-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e8eaed; text-align: center; }
  .summary-card .sc-value { font-size: 28px; font-weight: 700; color: #1a73e8; }
  .summary-card .sc-value.green { color: #27ae60; }
  .summary-card .sc-value.orange { color: #e67e22; }
  .summary-card .sc-label { font-size: 12px; color: #999; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }

  .live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .live-box { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e8eaed; }
  .live-box-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }

  .txn-list { max-height: 400px; overflow-y: auto; }
  .txn-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; align-items: center; }
  .txn-row:last-child { border-bottom: none; }
  .txn-time { color: #999; min-width: 65px; }
  .txn-items { color: #555; flex: 1; margin: 0 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .txn-amount { color: #27ae60; font-weight: 600; min-width: 65px; text-align: right; }
  .txn-tender { font-size: 11px; color: #999; min-width: 50px; text-align: right; }

  .item-list { max-height: 400px; overflow-y: auto; }
  .item-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .item-rank { color: #999; min-width: 28px; }
  .item-desc { color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-qty { color: #1a73e8; min-width: 45px; text-align: right; margin: 0 8px; font-weight: 600; }
  .item-amt { color: #27ae60; min-width: 65px; text-align: right; }

  /* History table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { text-align: left; padding: 10px 8px; color: #999; border-bottom: 2px solid #e8eaed; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .data-table td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; }
  .data-table tr:hover { background: #f8f9fa; }
  .data-table .num { text-align: right; }

  /* Date range bar */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #d0d5dd; background: #fff; color: #555; cursor: pointer; font-size: 12px; }
  .filter-btn.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .filter-input { padding: 6px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 12px; }
  .filter-label { font-size: 12px; color: #999; }

  /* Fuel section */
  .fuel-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .fuel-grade { color: #333; flex: 1; }
  .fuel-gal { color: #1a73e8; min-width: 80px; text-align: right; font-weight: 500; }
  .fuel-amt { color: #27ae60; min-width: 70px; text-align: right; font-weight: 600; }
  .fuel-ppg { color: #999; min-width: 70px; text-align: right; }

  /* === MODAL === */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 200; }
  .modal-box { background: #fff; border-radius: 12px; padding: 28px; width: 380px; max-width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
  .modal-box h3 { color: #333; margin-bottom: 4px; font-size: 18px; }
  .modal-box .modal-store { color: #999; font-size: 13px; margin-bottom: 16px; }
  .modal-box label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 14px; font-weight: 500; }
  .modal-box input, .modal-box textarea { width: 100%; padding: 10px 12px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 14px; color: #333; }
  .modal-box input:focus, .modal-box textarea:focus { outline: none; border-color: #1a73e8; }
  .modal-box textarea { height: 60px; resize: vertical; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .modal-btns button { padding: 9px 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; font-weight: 600; }
  .btn-save { background: #1a73e8; color: #fff; }
  .btn-cancel { background: #f0f0f0; color: #333; }

  /* Live Transactions mobile style */
  .ltx-header { margin-bottom: 20px; }
  .ltx-title { font-size: 26px; font-weight: 300; color: #333; }
  .ltx-sub { font-size: 14px; color: #999; margin-top: 4px; }
  .ltx-datebar { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #e8eaed; }
  .ltx-datebar strong { font-size: 14px; color: #333; }
  .ltx-search { border: 1px solid #d0d5dd; border-radius: 8px; padding: 8px 12px; font-size: 13px; width: 120px; }
  .ltx-list { background: #fff; border-radius: 10px; border: 1px solid #e8eaed; overflow: hidden; }
  .ltx-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.1s; }
  .ltx-row:last-child { border-bottom: none; }
  .ltx-row:hover { background: #f8f9fa; }
  .ltx-row.flagged .ltx-store { color: #e74c3c; }
  .ltx-store { font-size: 15px; font-weight: 500; color: #333; }
  .ltx-time { font-size: 12px; color: #999; margin-top: 2px; }
  .ltx-amount { padding: 4px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; color: #fff; min-width: 70px; text-align: center; }
  .ltx-amount.normal { background: #adb5bd; }
  .ltx-amount.flagged { background: #e74c3c; }
  .ltx-arrow { color: #ccc; font-size: 18px; margin-left: 8px; }
  .ltx-flag { color: #e74c3c; margin-right: 6px; font-size: 14px; }

  /* Receipt detail */
  .receipt { background: #fff; border-radius: 12px; border: 1px solid #e8eaed; padding: 28px 24px; max-width: 500px; margin: 0 auto; }
  .receipt-store { text-align: center; font-size: 22px; color: #999; font-weight: 300; }
  .receipt-date { text-align: center; font-size: 13px; color: #aaa; margin-top: 4px; margin-bottom: 20px; }
  .receipt-hdr { display: flex; justify-content: space-between; font-size: 12px; color: #999; font-weight: 600; padding-bottom: 6px; border-bottom: 1px dashed #ddd; margin-bottom: 8px; }
  .receipt-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
  .receipt-item-name { color: #555; flex: 1; font-family: 'Courier New', monospace; }
  .receipt-item-qty { color: #999; min-width: 50px; text-align: center; font-family: 'Courier New', monospace; }
  .receipt-item-amt { color: #333; min-width: 60px; text-align: right; font-family: 'Courier New', monospace; }
  .receipt-total { margin-top: 16px; border-top: 1px dashed #ddd; padding-top: 12px; text-align: right; }
  .receipt-total-label { font-size: 14px; color: #6ca0dc; font-weight: 600; }
  .receipt-total-line { font-size: 14px; color: #555; margin-top: 4px; font-family: 'Courier New', monospace; }

  .pdi-badge { position: fixed; bottom: 16px; right: 16px; width: 44px; height: 44px; background: #00bcd4; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 50; }

  @media (max-width: 1100px) { .cards-row { grid-template-columns: repeat(3, 1fr); } .live-summary-cards { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .sidebar.open { display: block; width: 220px; z-index: 200; }
    .main { margin-left: 0; padding: 16px 12px; }
    .topbar { padding: 0 10px; }
    .topbar-nav { gap: 10px; }
    .topbar-nav a { font-size: 12px; }
    .cards-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .task-card { padding: 14px; min-height: 120px; }
    .tc-date { font-size: 18px; }
    .tc-count { font-size: 22px; }
    .bottom-grid { grid-template-columns: 1fr; }
    .live-summary-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
    .summary-card { padding: 14px; }
    .summary-card .sc-value { font-size: 20px; }
    .live-grid { grid-template-columns: 1fr; }
    .section-box { padding: 14px; }
    .data-table { font-size: 11px; }
    .data-table th, .data-table td { padding: 6px 4px; }
    .store-select-bar select { width: 100%; }
    .filter-bar { gap: 4px; }
    .filter-btn { padding: 5px 10px; font-size: 11px; }
    .page-title { font-size: 16px; flex-wrap: wrap; }
    .hamburger { display: flex !important; }
  }
  .hamburger { display: none; width: 36px; height: 36px; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; color: #333; border-radius: 6px; }
  .hamburger:hover { background: #f0f0f0; }
  .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 190; }
  .sidebar-overlay.open { display: block; }
</style>
</head>
<body>

<!-- TOP HEADER BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="hamburger" onclick="toggleSidebar()">&#9776;</div>
    <svg viewBox="0 0 80 28" xmlns="http://www.w3.org/2000/svg" style="height:26px;">
      <text x="2" y="22" font-family="Arial" font-weight="900" font-size="20" fill="#1a73e8">PDI</text>
    </svg>
    <div class="topbar-nav">
      <a id="navLiveData" onclick="navigateTo('livedata')">Live Data</a>
      <a id="navAllItems" onclick="navigateTo('items')">All Items</a>
      <a id="navReports" onclick="navigateTo('reports')">All Store Reports &#9662;</a>
    </div>
  </div>
  <div class="topbar-right">
    <span class="topbar-icon">&#9786;</span>
    <span class="topbar-icon">&#128276;</span>
    <span class="topbar-icon">&#9432;</span>
    <span class="topbar-icon">?</span>
    <span class="topbar-icon">&#9783;</span>
    <span class="topbar-icon" onclick="window.location='/logout'">&#128100;</span>
  </div>
</div>

<!-- LEFT SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-store" onclick="document.getElementById('storeDropdown').click()">
    <div class="store-circle" id="storeCircle">AM</div>
    <div class="store-info">
      <strong id="storeNameDisplay">Amiya Express 2</strong>
      <small id="storeAccountDisplay">Account #: 864109</small>
    </div>
  </div>
  <div class="sidebar-menu" id="sidebarMenu">
    <a class="sidebar-item active" data-page="tasks" onclick="navigateTo('tasks')">Basic Tasks</a>
    <a class="sidebar-item" data-page="livedata" onclick="navigateTo('livedata')">Live Data</a>
    <a class="sidebar-item" data-page="items" onclick="navigateTo('items')">All Items</a>
    <a class="sidebar-item" data-page="livetxn" onclick="navigateTo('livetxn')">Live Transactions</a>
    <a class="sidebar-item" href="/coke" style="color:#e94560;">Coke Ordering <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" href="/txvision" style="color:#00d4aa;">TransactionVision <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" data-page="history" onclick="navigateTo('history')">Day Closing <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" onclick="navigateTo('items')">Grocery <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" onclick="navigateTo('livedata')">Gas <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" onclick="return false;">Lottery/Lotto <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" onclick="return false;">Tender Types <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" data-page="reports" onclick="navigateTo('reports')">Report Center <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" onclick="return false;">Price Book <span class="arrow">&#9656;</span></a>
    <a class="sidebar-item" onclick="return false;">Store Settings</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="store-select-bar">
    <select id="storeDropdown" onchange="switchStore(this.value)">
      <option value="77573764">Amiya Express 2</option>
      <option value="10064461">801 S Main St</option>
      <option value="7413">Amiya Express</option>
    </select>
  </div>
  <div id="pageContent"></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="pdi-badge">PDI</div>

<script>
const API = window.location.origin;
const STORES = {
  '77573764': {name: 'Amiya Express 2', account: '864109', initials: 'AM'},
  '10064461': {name: '801 S Main St', account: '904286', initials: '80'},
  '7413': {name: 'Amiya Express', account: '516334', initials: 'AM'},
};
let currentStore = '77573764';
let currentPage = 'tasks';
let selectedRange = 7;

function $(id) { return document.getElementById(id); }
async function fetchRetry(url, retries=2) {
  let lastErr;
  for (let i = 0; i <= retries; i++) {
    try {
      const r = await fetch(url);
      if (r.ok) return r;
      if (r.status === 401) { window.location = '/login'; return r; }
      lastErr = new Error('HTTP ' + r.status);
    } catch(e) { lastErr = e; }
    if (i < retries) await new Promise(function(res) { setTimeout(res, 1000); });
  }
  throw lastErr;
}
function fmt(n) { return '$' + Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmtN(n) { return Number(n||0).toLocaleString(); }
function fmtD(d) { if (!d) return ''; const dt=new Date(d+'T00:00:00'); const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return m[dt.getMonth()]+' '+dt.getDate(); }
function fmtFull(d) { if (!d) return ''; const dt=new Date(d+'T00:00:00'); return (dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear(); }
function daysSince(d) { if (!d) return null; const t=new Date();t.setHours(0,0,0,0); return Math.floor((t-new Date(d+'T00:00:00'))/864e5); }
function dateCls(days,w,c) { if(days===null)return''; return days<=w?'':days<=c?'warn':'critical'; }

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  $('sidebarOverlay').classList.toggle('open');
}

function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  $('sidebarOverlay').classList.remove('open');
}

function switchStore(sid) {
  currentStore = sid;
  const s = STORES[sid];
  $('storeCircle').textContent = s.initials;
  $('storeNameDisplay').textContent = s.name;
  $('storeAccountDisplay').textContent = 'Account #: ' + s.account;
  $('storeDropdown').value = sid;
  ltxDate = '';
  liveDate = '';
  loadPage();
}

function navigateTo(page) {
  currentPage = page;
  // Update sidebar active
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  // Update topbar nav
  $('navLiveData').className = page === 'livedata' ? 'active-nav' : '';
  $('navAllItems').className = page === 'items' ? 'active-nav' : '';
  $('navReports').className = page === 'reports' ? 'active-nav' : '';
  closeSidebar();
  loadPage();
}

function loadPage() {
  if (currentPage === 'tasks') loadTasks();
  else if (currentPage === 'livedata') loadLiveData();
  else if (currentPage === 'livetxn') loadLiveTxn();
  else if (currentPage === 'history') loadHistory();
  else if (currentPage === 'items') loadItems();
  else if (currentPage === 'reports') loadHistory();
}

// ==================== TASKS PAGE ====================
async function loadTasks() {
  const pc = $('pageContent');

let liveDate = '';
let liveTxns = [];

async function loadLiveData() {
  const pc = $('pageContent');
  pc.innerHTML = `<div class="page-title" style="display:flex;justify-content:space-between;align-items:center;">
    <span>&#128202; Transactions from today</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="filter-btn" onclick="changeDate(-1)" style="padding:4px 10px;font-size:16px;">&lt;</button>
      <input type="date" id="liveDatePicker" class="filter-input" value="${liveDate}" onchange="liveDate=this.value;fetchLiveData()">
      <button class="filter-btn" onclick="changeDate(1)" style="padding:4px 10px;font-size:16px;">&gt;</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
    <div class="section-box" style="max-height:500px;display:flex;flex-direction:column;">
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">Transaction Summary
        <div style="display:flex;gap:6px;">
          <select id="liveStoreFilter" class="filter-input" style="font-size:11px;padding:4px 8px;" onchange="fetchLiveData()">
            <option value="">All Store</option>
            <option value="77573764">Amiya Express 2</option>
            <option value="10064461">801 S Main St</option>
            <option value="7413">Amiya Express</option>
          </select>
          <select id="liveTypeFilter" class="filter-input" style="font-size:11px;padding:4px 8px;" onchange="fetchLiveData()">
            <option value="">All Type</option>
            <option value="sale">Sale</option>
            <option value="refund">Refund</option>
            <option value="void">Void</option>
            <option value="financial">Financial</option>
          </select>
          <select id="liveLimitFilter" class="filter-input" style="font-size:11px;padding:4px 8px;" onchange="fetchLiveData()">
            <option value="50">Last 50</option>
            <option value="100">Last 100</option>
            <option value="200">Last 200</option>
          </select>
        </div>
      </div>
      <div id="txnList" style="flex:1;overflow-y:auto;">Loading...</div>
    </div>
    <div class="section-box" id="txnDetail" style="max-height:500px;overflow-y:auto;">
      <div class="section-title">Transaction Detail</div>
      <div style="color:#999;text-align:center;padding:40px;">Click a transaction to view details</div>
    </div>
  </div>
  <div id="salesSummary">Loading summary...</div>`;

function changeDate(delta) {
  const picker = $('liveDatePicker');
  const d = new Date((picker.value || new Date().toISOString().split('T')[0]) + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  liveDate = d.toISOString().split('T')[0];
  picker.value = liveDate;
  fetchLiveData();
}

async function fetchLiveData() {
  const storeFilter = ($('liveStoreFilter')||{}).value || '';
  const typeFilter = ($('liveTypeFilter')||{}).value || '';
  const limitFilter = ($('liveLimitFilter')||{}).value || '50';

  var activeStore = storeFilter || currentStore;
  let url = `${API}/api/transactions?limit=${limitFilter}&store_id=${activeStore}`;
  if (liveDate) url += `&on_date=${liveDate}`;
  if (typeFilter) url += `&event_type=${typeFilter}`;

  try {
    const data = await (await fetch(url)).json();
    liveTxns = data.transactions || [];
    liveDate = data.date;
    if ($('liveDatePicker')) $('liveDatePicker').value = liveDate;

    let h = '';
    if (liveTxns.length === 0) {
      h = '<div style="color:#999;text-align:center;padding:40px;">No transactions</div>';
    } else {
      for (const t of liveTxns) {
        h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:1px solid #f0f0f0;cursor:pointer;" onclick="showTxnDetail(${t.id})" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background=''">
          <div style="flex:1;">
            <div style="color:#1a73e8;font-size:13px;font-weight:500;">${t.store_name}</div>
            <div style="color:#999;font-size:11px;">${t.time || ''}</div>
          </div>
          <div style="text-align:right;min-width:80px;">
            <div style="color:#27ae60;font-weight:600;font-size:14px;">$ ${t.total.toFixed(2)}</div>
            <div style="color:#999;font-size:11px;">${t.tender}</div>
          </div>
          <div style="color:#ccc;margin-left:8px;font-size:14px;">&#9656;</div>
        </div>`;
      }
    }
    $('txnList').innerHTML = h;

    // Load sales summary
    const sumData = await (await fetchRetry(`${API}/api/sales-summary?on_date=${liveDate}`)).json();
    let s = '<div class="section-box"><div class="section-title">Sales and Inventory Summary</div>';
    s += '<table class="data-table"><thead><tr><th>Store Name</th><th class="num">Total Sales</th><th class="num">Grocery Sales</th><th class="num">Gas (Vol)</th><th class="num">No Sale</th><th class="num">Void</th><th class="num">Refunds</th></tr></thead><tbody>';
    for (const st of sumData.stores) {
      const noSaleCls = st.no_sale > 0 ? 'style="background:#f39c12;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;"' : 'style="background:#27ae60;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;"';
      const voidCls = st.voids > 0 ? 'style="background:#f39c12;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;"' : 'style="background:#27ae60;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;"';
      const refCls = st.refunds > 0 ? 'style="background:#e74c3c;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;"' : 'style="background:#27ae60;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;"';
      s += `<tr><td>${st.store_name}${st.updated?'<br><span style="color:#999;font-size:10px;">Updated: '+new Date(st.updated).toLocaleTimeString()+'</span>':''}</td><td class="num">${fmt(st.total_sales)}</td><td class="num">${fmt(st.grocery_sales)}</td><td class="num">${fmtN(Math.round(st.gas_vol))}</td><td class="num"><span ${noSaleCls}>${st.no_sale}</span></td><td class="num"><span ${voidCls}>${st.voids}</span></td><td class="num"><span ${refCls}>${st.refunds}</span></td></tr>`;
    }
    s += '</tbody></table></div>';
    $('salesSummary').innerHTML = s;

    // Auto-select first transaction
    if (liveTxns.length > 0) showTxnDetail(liveTxns[0].id);
  } catch(e) { $('txnList').innerHTML = `<div style="color:red;padding:10px;">${e.message}</div>`; }
}

async function showTxnDetail(txnId) {
  const panel = $('txnDetail');
  panel.innerHTML = '<div class="section-title">Transaction Detail</div><div style="color:#999;padding:20px;text-align:center;">Loading...</div>';
  try {
    const t = await (await fetchRetry(`${API}/api/transaction/${txnId}`)).json();
    let h = '<div class="section-title">Transaction Detail</div>';
    h += `<div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:16px;font-weight:600;">${t.store_name}</div>
      <div style="color:#999;font-size:13px;">${t.date} ${t.time||''}</div>
    </div>`;
    h += `<div style="display:flex;justify-content:space-between;margin-bottom:14px;font-size:13px;color:#666;">
      <span>Employee: ${t.cashier||'N/A'}</span>
      <span>Station: ${t.register||'N/A'}</span>
    </div>`;

    // Items
    if (t.items && t.items.length > 0) {
      h += '<table style="width:100%;font-size:13px;margin-bottom:12px;">';
      for (const i of t.items) {
        h += `<tr style="border-bottom:1px solid #f0f0f0;"><td style="padding:6px 0;color:#333;">${i.description||i.scan_code}</td><td style="padding:6px 4px;color:#999;text-align:center;">x${Math.round(i.qty)}</td><td style="padding:6px 0;text-align:right;color:#333;">${fmt(i.amount)}</td></tr>`;
      }
      h += '</table>';
    }

    // Fuel
    if (t.fuel && t.fuel.length > 0) {
      for (const f of t.fuel) {
        h += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;"><span>${f.grade}</span><span>${f.gallons.toFixed(3)} gal</span><span>${fmt(f.amount)}</span></div>`;
      }
    }

    // Total
    h += `<div style="border-top:2px solid #e0e0e0;margin-top:12px;padding-top:12px;text-align:right;">
      <div style="font-size:12px;color:#1a73e8;font-weight:600;text-transform:uppercase;">TOTAL</div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;">
        <div><span style="color:#1a73e8;font-weight:500;">${t.tender||'Cash'}</span></div>
        <div>
          <div style="font-size:13px;">Gross <strong>${fmt(t.total)}</strong></div>
        </div>
      </div>
    </div>`;

    panel.innerHTML = h;
  } catch(e) { panel.innerHTML = `<div class="section-title">Transaction Detail</div><div style="color:red;padding:10px;">${e.message}</div>`; }
}

// ==================== HISTORY / DAY CLOSING PAGE ====================
async function loadHistory() {
  const pc = $('pageContent');
  let h = '<div class="page-title">&#128197; Daily Sales History</div>';
  h += `<div class="filter-bar">`;
  for (const d of [7,14,30,90]) { h += `<button class="filter-btn ${selectedRange===d?'active':''}" onclick="selectedRange=${d};loadHistory()">${d}d</button>`; }
  h += `<input type="date" class="filter-input" id="hFrom" onchange="loadHistoryRange()"> <span class="filter-label">to</span> <input type="date" class="filter-input" id="hTo" onchange="loadHistoryRange()">`;
  h += '</div><div id="hTable">Loading...</div>';
  pc.innerHTML = h;

  try {
    const data = await (await fetchRetry(`${API}/api/dashboard?days=${selectedRange}`)).json();
    const store = data[currentStore];
    if (!store || !store.days || store.days.length === 0) { $('hTable').innerHTML = '<div style="color:#999;padding:20px;text-align:center;">No data for selected range</div>'; return; }

    let t = '<div class="section-box"><table class="data-table"><thead><tr><th>Date</th><th class="num">Transactions</th><th class="num">Items</th><th class="num">Merch $</th><th class="num">Fuel Gal</th><th class="num">Fuel $</th><th class="num">Total $</th></tr></thead><tbody>';
    let totTxn=0,totItems=0,totMerch=0,totFuelG=0,totFuel$=0,totRev=0;
    for (const d of store.days) {
      totTxn+=d.transactions; totItems+=d.items; totMerch+=d.item_revenue; totFuelG+=d.fuel_gallons; totFuel$+=d.fuel_revenue; totRev+=d.total_revenue;
      t += `<tr><td>${d.date}</td><td class="num">${fmtN(d.transactions)}</td><td class="num">${fmtN(d.items)}</td><td class="num">${fmt(d.item_revenue)}</td><td class="num">${fmtN(Math.round(d.fuel_gallons))}</td><td class="num">${fmt(d.fuel_revenue)}</td><td class="num" style="font-weight:600">${fmt(d.total_revenue)}</td></tr>`;
    }
    t += `</tbody><tfoot><tr style="font-weight:700;border-top:2px solid #333;"><td>TOTAL (${store.days.length} days)</td><td class="num">${fmtN(totTxn)}</td><td class="num">${fmtN(totItems)}</td><td class="num">${fmt(totMerch)}</td><td class="num">${fmtN(Math.round(totFuelG))}</td><td class="num">${fmt(totFuel$)}</td><td class="num">${fmt(totRev)}</td></tr></tfoot></table></div>`;
    $('hTable').innerHTML = t;
  } catch(e) { $('hTable').innerHTML = `<div style="color:red">Error: ${e.message}</div>`; }
}

async function loadHistoryRange() {
  const from=($('hFrom')||{}).value, to=($('hTo')||{}).value;
  if (!from||!to) return;
  try {
    const data = await (await fetchRetry(`${API}/api/dashboard?from_date=${from}&to_date=${to}`)).json();
    const store = data[currentStore];
    if (!store||!store.days.length) { $('hTable').innerHTML='<div style="color:#999;padding:20px;text-align:center;">No data</div>'; return; }
    let t='<div class="section-box"><table class="data-table"><thead><tr><th>Date</th><th class="num">Txns</th><th class="num">Items</th><th class="num">Merch $</th><th class="num">Fuel Gal</th><th class="num">Fuel $</th><th class="num">Total $</th></tr></thead><tbody>';
    for (const d of store.days) { t+=`<tr><td>${d.date}</td><td class="num">${fmtN(d.transactions)}</td><td class="num">${fmtN(d.items)}</td><td class="num">${fmt(d.item_revenue)}</td><td class="num">${fmtN(Math.round(d.fuel_gallons))}</td><td class="num">${fmt(d.fuel_revenue)}</td><td class="num" style="font-weight:600">${fmt(d.total_revenue)}</td></tr>`; }
    t+='</tbody></table></div>';
    $('hTable').innerHTML=t;
  } catch(e) { $('hTable').innerHTML=`<div style="color:red">Error: ${e.message}</div>`; }
}

// ==================== ALL ITEMS PAGE ====================
async function loadItems() {
  const pc = $('pageContent');
  let h = '<div class="page-title">&#128722; All Items</div>';
  h += `<div class="filter-bar">`;
  for (const d of [1,7,14,30,90,365]) { h += `<button class="filter-btn ${selectedRange===d?'active':''}" onclick="selectedRange=${d};loadItems()">${d===1?'Today':d===365?'1 Year':d+'d'}</button>`; }
  h += `<input type="text" class="filter-input" id="itemSearch" placeholder="Search by name or UPC..." oninput="filterItems()" style="min-width:200px;margin-left:8px;">`;
  h += `<button class="filter-btn" onclick="startScanner()" style="background:#1a73e8;color:#fff;border-color:#1a73e8;margin-left:4px;">&#128247; Scan Barcode</button>`;
  h += '</div><div id="scannerArea"></div><div id="iTable">Loading...</div>';
  pc.innerHTML = h;

  try {
    // First get store's actual date range
    var statusResp = await (await fetchRetry(API + '/api/status')).json();
    var storeInfo = null;
    for (var si = 0; si < statusResp.length; si++) {
      if (statusResp[si].store_id === currentStore) { storeInfo = statusResp[si]; break; }
    }
    var items;
    if (storeInfo && storeInfo.last_date) {
      // Calculate from_date based on selectedRange from last_date
      var endDate = storeInfo.last_date;
      var startDate = new Date(endDate + 'T00:00:00');
      startDate.setDate(startDate.getDate() - selectedRange + 1);
      var fromStr = startDate.toISOString().split('T')[0];
      items = await (await fetchRetry(API + '/api/store/' + currentStore + '/items?from_date=' + fromStr + '&to_date=' + endDate)).json();
      var rangeNote = '<div style="color:#666;font-size:12px;margin-bottom:8px;">Data from ' + fromStr + ' to ' + endDate + '</div>';
      $('iTable').innerHTML = rangeNote;
    } else {
      items = [];
    }
    window._allItems = items;
    renderItems(items, true);
  } catch(e) { $('iTable').innerHTML='<div style="color:red">Error: ' + e.message + '</div>'; }
}

function renderItems(items, append) {
  if (!items.length) { if (!append) $('iTable').innerHTML='<div style="color:#999;padding:20px;text-align:center;">No items for this period</div>'; return; }
  var existing = append ? ($('iTable').innerHTML || '') : '';
  var t = existing + '<div style="color:#999;font-size:12px;margin-bottom:8px;">' + items.length + ' items found</div>';
  t += '<div class="section-box"><table class="data-table"><thead><tr><th>#</th><th>UPC</th><th>Description</th><th class="num">Total Qty Sold</th><th class="num">Total Revenue</th><th class="num">Avg Price</th></tr></thead><tbody>';
  items.forEach((item,i) => {
    t += `<tr style="cursor:pointer" onclick="loadItemDetail('${currentStore}','${item.scan_code}')" onmouseover="this.style.background='#eef4ff'" onmouseout="this.style.background=''"><td>${i+1}</td><td style="color:#1a73e8;font-weight:500;">${item.scan_code}</td><td>${item.description}</td><td class="num" style="font-weight:600;color:#1a73e8;">${fmtN(item.qty)}</td><td class="num" style="font-weight:600;color:#27ae60;">${fmt(item.amount)}</td><td class="num">${fmt(item.avg_price)}</td></tr>`;
  });
  t += '</tbody></table></div>';
  $('iTable').innerHTML = t;
}

let scannerStream = null;

function startScanner() {
  const area = $('scannerArea');
  if (scannerStream) { stopScanner(); return; }

  area.innerHTML = `<div class="section-box" style="margin-bottom:14px;text-align:center;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-weight:600;">Scan Barcode</span>
      <button class="filter-btn" onclick="stopScanner()">&#10005; Close</button>
    </div>
    <video id="scanVideo" autoplay playsinline style="width:100%;max-width:400px;border-radius:8px;border:2px solid #1a73e8;"></video>
    <div style="margin-top:8px;">
      <input type="text" id="manualUpc" class="filter-input" placeholder="Or type/paste UPC here..." style="width:200px;" onkeydown="if(event.key==='Enter')lookupUpc(this.value)">
      <button class="filter-btn" onclick="lookupUpc($('manualUpc').value)" style="background:#1a73e8;color:#fff;border-color:#1a73e8;">Look Up</button>
    </div>
    <div id="scanStatus" style="color:#999;font-size:12px;margin-top:6px;">Point camera at barcode...</div>
  </div>`;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      scannerStream = stream;
      const video = $('scanVideo');
      video.srcObject = stream;
      // Use BarcodeDetector API if available
      if ('BarcodeDetector' in window) {
        const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'] });
        const scanLoop = async () => {
          if (!scannerStream) return;
          try {
            const barcodes = await detector.detect(video);
            if (barcodes.length > 0) {
              const code = barcodes[0].rawValue;
              $('scanStatus').innerHTML = `<span style="color:#27ae60;font-weight:600;">Found: ${code}</span>`;
              stopScanner();
              lookupUpc(code);
              return;
            }
          } catch(e) {}
          requestAnimationFrame(scanLoop);
        };
        video.onloadeddata = () => scanLoop();
      } else {
        $('scanStatus').textContent = 'Camera ready — BarcodeDetector not supported in this browser. Type UPC manually.';
      }
    })
    .catch(err => {
      area.innerHTML = `<div class="section-box" style="margin-bottom:14px;">
        <div style="color:#e74c3c;margin-bottom:8px;">Camera access denied: ${err.message}</div>
        <input type="text" id="manualUpc" class="filter-input" placeholder="Type or paste UPC..." style="width:200px;" onkeydown="if(event.key==='Enter')lookupUpc(this.value)">
        <button class="filter-btn" onclick="lookupUpc($('manualUpc').value)" style="background:#1a73e8;color:#fff;border-color:#1a73e8;">Look Up</button>
        <button class="filter-btn" onclick="stopScanner()" style="margin-left:4px;">Close</button>
      </div>`;
    });
}

function stopScanner() {
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
  $('scannerArea').innerHTML = '';
}

async function lookupUpc(upc) {
  upc = upc.trim();
  if (!upc) return;
  stopScanner();

  // Try exact match first, then try without check digit (C-Store strips it)
  const variations = [upc];
  if (upc.length === 12) variations.push(upc.substring(0, 11));
  if (upc.length === 13) variations.push(upc.substring(0, 12), upc.substring(0, 11));
  if (upc.length === 11) variations.push('0' + upc);

  for (const code of variations) {
    try {
      const resp = await fetchRetry(`${API}/api/store/${currentStore}/item/${code}?days=365`);
      if (resp.ok) {
        const data = await resp.json();
        if (data && data.days_sold > 0) {
          loadItemDetail(currentStore, code);
          return;
        }
      }
    } catch(e) {}
  }

  // Not found — search in current items list
  if (window._allItems) {
    const match = window._allItems.find(i => variations.some(v => i.scan_code === v || i.scan_code.includes(v) || v.includes(i.scan_code)));
    if (match) {
      loadItemDetail(currentStore, match.scan_code);
      return;
    }
  }

  alert('UPC not found: ' + upc + '\nTried: ' + variations.join(', '));
}

function filterItems() {
  const q = (($('itemSearch')||{}).value||'').toLowerCase();
  if (!window._allItems) return;
  const filtered = q ? window._allItems.filter(i => i.description.toLowerCase().includes(q) || i.scan_code.includes(q)) : window._allItems;
  renderItems(filtered);
}

async function loadItemDetail(storeId, scanCode) {
  const pc = $('pageContent');
  pc.innerHTML = '<div style="padding:20px;color:#999;">Loading item detail...</div>';
  try {
    const data = await (await fetchRetry(`${API}/api/store/${storeId}/item/${scanCode}?days=365`)).json();
    let h = `<div style="margin-bottom:12px"><button class="filter-btn" onclick="loadItems()" style="cursor:pointer">&#8592; Back to All Items</button></div>`;

    // Item summary card
    h += `<div class="section-box" style="margin-bottom:16px">
      <div style="font-size:22px;font-weight:700;color:#333">${data.description}</div>
      <div style="color:#999;margin-top:4px;font-size:14px;">UPC: <span style="color:#1a73e8;font-weight:500;">${data.scan_code}</span> &nbsp;|&nbsp; ${(STORES[storeId]||{}).name||storeId}</div>
      <div style="display:flex;gap:32px;margin-top:20px;flex-wrap:wrap">
        <div><div style="color:#999;font-size:11px;text-transform:uppercase;">Total Sold</div><div style="font-size:26px;font-weight:700;color:#1a73e8">${fmtN(data.total_qty)}</div></div>
        <div><div style="color:#999;font-size:11px;text-transform:uppercase;">Revenue</div><div style="font-size:26px;font-weight:700;color:#27ae60">${fmt(data.total_revenue)}</div></div>
        <div><div style="color:#999;font-size:11px;text-transform:uppercase;">Avg Price</div><div style="font-size:26px;font-weight:700;color:#333">${fmt(data.avg_price)}</div></div>
        <div><div style="color:#999;font-size:11px;text-transform:uppercase;">Avg / Day</div><div style="font-size:26px;font-weight:700;color:#1a73e8">${data.avg_daily}</div></div>
        <div><div style="color:#999;font-size:11px;text-transform:uppercase;">Days Sold</div><div style="font-size:26px;font-weight:700;color:#333">${data.days_sold}</div></div>
        <div><div style="color:#999;font-size:11px;text-transform:uppercase;">First Sold</div><div style="font-size:16px;font-weight:600;color:#555">${data.first_sold||'N/A'}</div></div>
        <div><div style="color:#999;font-size:11px;text-transform:uppercase;">Last Sold</div><div style="font-size:16px;font-weight:600;color:#555">${data.last_sold||'N/A'}</div></div>
      </div>
    </div>`;

    // Daily history — click date to see transactions
    h += '<div class="section-box"><div class="section-title">Daily Sales History <span style="font-size:12px;color:#999;font-weight:400;">(click date to see transactions)</span></div>';
    h += '<table class="data-table"><thead><tr><th>Date</th><th class="num">Qty Sold</th><th class="num">Revenue</th><th class="num">Avg Price</th><th class="num">Transactions</th></tr></thead><tbody>';
    for (const d of data.daily) {
      h += `<tr style="cursor:pointer" onclick="loadDateTxns('${storeId}','${scanCode}','${d.date}','${data.description.replace(/'/g,"\\'")}')" onmouseover="this.style.background='#eef4ff'" onmouseout="this.style.background=''">
        <td style="color:#1a73e8;font-weight:500;">${d.date}</td><td class="num" style="font-weight:600;">${fmtN(d.qty)}</td><td class="num" style="color:#27ae60;">${fmt(d.revenue)}</td><td class="num">${fmt(d.avg_price)}</td><td class="num">${d.transactions}</td></tr>`;
    }
    h += '</tbody></table></div>';
    pc.innerHTML = h;
  } catch(e) { pc.innerHTML = `<div style="color:red">Error: ${e.message}</div>`; }
}

async function loadDateTxns(storeId, scanCode, onDate, itemName) {
  const pc = $('pageContent');
  pc.innerHTML = '<div style="padding:20px;color:#999;">Loading transactions...</div>';
  try {
    const txns = await (await fetchRetry(`${API}/api/store/${storeId}/item/${scanCode}/transactions?on_date=${onDate}`)).json();
    let h = `<div style="margin-bottom:12px;display:flex;gap:8px;">
      <button class="filter-btn" onclick="loadItemDetail('${storeId}','${scanCode}')" style="cursor:pointer">&#8592; Back to ${itemName}</button>
      <button class="filter-btn" onclick="loadItems()" style="cursor:pointer">&#8592; All Items</button>
    </div>`;

    h += `<div class="section-box" style="margin-bottom:16px">
      <div style="font-size:18px;font-weight:700;color:#333">${itemName}</div>
      <div style="color:#999;margin-top:4px;">UPC: ${scanCode} &nbsp;|&nbsp; ${onDate} &nbsp;|&nbsp; ${txns.length} transactions</div>
    </div>`;

    if (txns.length === 0) {
      h += '<div style="color:#999;padding:20px;text-align:center;">No transactions found</div>';
    } else {
      for (const t of txns) {
        const otherItems = (t.all_items||'').split(', ').filter(i => i.trim() && !i.includes(itemName));
        h += `<div class="section-box" style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-size:16px;font-weight:600;color:#1a73e8;">${t.time||'N/A'}</div>
            <div style="font-size:18px;font-weight:700;color:#27ae60;">${fmt(t.txn_total)}</div>
          </div>
          <div style="display:flex;gap:16px;font-size:12px;color:#999;margin-bottom:10px;">
            <span>Tender: ${t.tender}</span>
            <span>Register: ${t.register}</span>
            <span>Cashier: ${t.cashier||'N/A'}</span>
          </div>
          <div style="background:#f8f9fa;border-radius:8px;padding:10px 14px;margin-bottom:8px;">
            <div style="font-size:15px;font-weight:600;color:#333;">${itemName} x ${Math.round(t.item_qty)}</div>
            <div style="font-size:13px;color:#999;margin-top:2px;">${fmt(t.item_amount)} (${fmt(t.item_price)} each)</div>
          </div>`;

        if (otherItems.length > 0) {
          h += `<div style="margin-top:8px;"><div style="font-size:11px;color:#999;text-transform:uppercase;margin-bottom:4px;">Also in basket (${otherItems.length} items)</div>`;
          for (const oi of otherItems) {
            const parts = oi.split(' x');
            h += `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px;border-bottom:1px solid #f0f0f0;"><span style="color:#555;">${parts[0]||oi}</span><span style="color:#999;">x${parts[1]||''}</span></div>`;
          }
          h += '</div>';
        }
        h += '</div>';
      }
    }
    pc.innerHTML = h;
  } catch(e) { pc.innerHTML = `<div style="color:red">Error: ${e.message}</div>`; }
}

// ==================== LIVE TRANSACTIONS PAGE ====================
let ltxDate = '';

async function loadLiveTxn() {
  const pc = $('pageContent');
  if (!ltxDate) {
    // Find most recent date with data
    try {
      const d = await (await fetchRetry(`${API}/api/transactions?limit=1&store_id=${currentStore}`)).json();
      ltxDate = d.date || new Date().toISOString().split('T')[0];
    } catch(e) { ltxDate = new Date().toISOString().split('T')[0]; }
  }

  pc.innerHTML = `<div class="ltx-header">
    <div class="ltx-title">Live Transactions</div>
    <div class="ltx-sub">From your store's POS Register. Pull page down to refresh</div>
  </div>
  <div class="ltx-datebar">
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="filter-btn" onclick="changeLtxDate(-1)" style="padding:4px 10px;">&#9664;</button>
      <strong>As of <input type="date" id="ltxDatePicker" value="${ltxDate}" onchange="ltxDate=this.value;fetchLtxList()" style="border:1px solid #d0d5dd;border-radius:6px;padding:4px 8px;font-size:13px;"></strong>
      <button class="filter-btn" onclick="changeLtxDate(1)" style="padding:4px 10px;">&#9654;</button>
    </div>
    <input type="text" class="ltx-search" id="ltxSearch" placeholder="Search..." oninput="filterLtxList()">
  </div>
  <div id="ltxContent">Loading...</div>`;

  fetchLtxList();
}

function changeLtxDate(delta) {
  const d = new Date(ltxDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  ltxDate = d.toISOString().split('T')[0];
  if ($('ltxDatePicker')) $('ltxDatePicker').value = ltxDate;
  fetchLtxList();
}

let ltxAllTxns = [];

async function fetchLtxList() {
  try {
    const data = await (await fetchRetry(`${API}/api/transactions?on_date=${ltxDate}&limit=200&store_id=${currentStore}`)).json();
    ltxAllTxns = data.transactions || [];
    ltxDate = data.date;
    if ($('ltxDatePicker')) $('ltxDatePicker').value = ltxDate;
    renderLtxList(ltxAllTxns);
  } catch(e) { $('ltxContent').innerHTML = `<div style="color:red">${e.message}</div>`; }
}

function filterLtxList() {
  const q = (($('ltxSearch')||{}).value || '').toLowerCase();
  const filtered = q ? ltxAllTxns.filter(t => t.store_name.toLowerCase().includes(q) || t.items_desc.toLowerCase().includes(q) || t.tender.toLowerCase().includes(q) || String(t.total).includes(q)) : ltxAllTxns;
  renderLtxList(filtered);
}

function renderLtxList(txns) {
  if (txns.length === 0) {
    $('ltxContent').innerHTML = '<div style="color:#999;text-align:center;padding:40px;">No transactions for this date</div>';
    return;
  }
  let h = '<div class="ltx-list">';
  for (const t of txns) {
    const isFlagged = t.event_type === 'void' || t.event_type === 'refund' || t.total >= 25;
    const flagCls = (t.event_type === 'void' || t.event_type === 'refund') ? ' flagged' : '';
    const amtCls = (t.event_type === 'void' || t.event_type === 'refund') ? 'flagged' : 'normal';
    const flagIcon = (t.event_type === 'void' || t.event_type === 'refund') ? '<span class="ltx-flag">&#9888;</span>' : '';
    h += `<div class="ltx-row${flagCls}" onclick="showReceipt(${t.id})">
      <div>
        <div class="ltx-store">${flagIcon}${t.store_name}</div>
        <div class="ltx-time">@${t.time || 'N/A'}</div>
      </div>
      <div style="display:flex;align-items:center;">
        <span class="ltx-amount ${amtCls}">$${t.total.toFixed(2)}</span>
        <span class="ltx-arrow">&#9656;</span>
      </div>
    </div>`;
  }
  h += '</div>';
  $('ltxContent').innerHTML = h;
}

async function showReceipt(txnId) {
  const pc = $('pageContent');
  pc.innerHTML = '<div style="padding:20px;color:#999;text-align:center;">Loading receipt...</div>';
  try {
    const t = await (await fetchRetry(`${API}/api/transaction/${txnId}`)).json();

    let h = `<div style="margin-bottom:14px;">
      <button class="filter-btn" onclick="loadLiveTxn()" style="cursor:pointer;">&#8592; Back to Transactions</button>
    </div>`;

    h += '<div class="receipt">';
    h += `<div class="receipt-store">${t.store_name}</div>`;
    h += `<div class="receipt-date">${t.date} ${t.time || ''}</div>`;

    // Items header
    h += `<div class="receipt-hdr"><span>Item</span><span>Quantity</span><span>Amount</span></div>`;

    // Items
    let gross = 0;
    if (t.items && t.items.length > 0) {
      for (const i of t.items) {
        gross += i.amount;
        h += `<div class="receipt-item">
          <span class="receipt-item-name">${i.description || i.scan_code}</span>
          <span class="receipt-item-qty">x ${Math.round(i.qty)}</span>
          <span class="receipt-item-amt">${i.amount.toFixed(2)}</span>
        </div>`;
      }
    }

    // Fuel
    if (t.fuel && t.fuel.length > 0) {
      for (const f of t.fuel) {
        gross += f.amount;
        h += `<div class="receipt-item">
          <span class="receipt-item-name">${f.grade}</span>
          <span class="receipt-item-qty">${f.gallons.toFixed(3)} gal</span>
          <span class="receipt-item-amt">${f.amount.toFixed(2)}</span>
        </div>`;
      }
    }

    // Totals
    const tax = Math.max(0, t.total - gross);
    h += `<div class="receipt-total">
      <div class="receipt-total-label">TOTAL</div>
      <div class="receipt-total-line">GROSS $${gross.toFixed(2)}</div>
      ${tax > 0.01 ? `<div class="receipt-total-line">Tax $${tax.toFixed(2)}</div>` : ''}
      <div class="receipt-total-line" style="font-weight:700;">Net $${t.total.toFixed(2)}</div>
    </div>`;

    // Tender
    h += `<div style="margin-top:12px;padding-top:12px;border-top:1px dashed #ddd;font-size:13px;color:#6ca0dc;">
      ${t.tender || 'Cash'}
    </div>`;

    h += '</div>';
    pc.innerHTML = h;
  } catch(e) { pc.innerHTML = `<div style="color:red;padding:20px;">${e.message}</div>`; }
}

// ==================== EDIT TASK MODAL ====================
function editTask(storeId, taskKey, label, currentDate, currentValue) {
  const today = new Date().toISOString().split('T')[0];
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal-box"><h3>${label}</h3><div class="modal-store">${(STORES[storeId]||{}).name||storeId}</div><label>Date</label><input type="date" id="taskDate" value="${currentDate||today}"><label>Value</label><input type="text" id="taskValue" value="${currentValue}" placeholder="Count, time, notes..."><label>Notes</label><textarea id="taskNotes" placeholder="Optional notes..."></textarea><div class="modal-btns"><button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-save" onclick="saveTask('${storeId}','${taskKey}')">Save</button></div></div>`;
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  document.body.appendChild(modal);
}

async function saveTask(storeId, taskKey) {
  try {
    await fetch(`${API}/api/tasks/update`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({store_id:storeId, task_key:taskKey, last_date:$('taskDate').value||null, last_value:$('taskValue').value, notes:$('taskNotes').value}) });
    var mo=document.querySelector('.modal-overlay'); if(mo) mo.remove();
    loadTasks();
  } catch(e) { alert('Error: '+e.message); }
}

// Start
loadPage();
</script>
